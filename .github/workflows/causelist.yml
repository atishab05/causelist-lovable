# Chhattisgarh High Court – Causelist Tracker
# Runs automatically at IST upload times (converted to UTC):
#
#   Daily List        → 17:30 IST = 12:00 UTC  (Mon–Sat)
#   Supplementary List→ 18:30 IST = 13:00 UTC  (Mon–Sat)
#   Weekly List       → 17:30 IST = 12:00 UTC  (Wednesday only)
#
# Each run retries up to 3 times if the PDF is not yet uploaded.

name: Causelist Tracker

on:
  schedule:
    # Daily List — 14:00 UTC = 19:30 IST, Mon–Sat
    - cron: '0 14 * * 1-6'
    # Supplementary List — 14:30 UTC = 20:00 IST, Mon–Sat
    - cron: '30 14 * * 1-6'
    # Weekly List — 14:00 UTC = 19:30 IST, Wednesday only
    - cron: '0 14 * * 3' 

  # Allow manual trigger from GitHub UI for testing
  workflow_dispatch:
    inputs:
      list_type:
        description: 'List type to run'
        required: false
        default: 'ALL'
        type: choice
        options:
          - ALL
          - DAILY LIST
          - SUPPLEMENTARY LIST
          - WEEKLY LIST

permissions:
  contents: write
  
jobs:
  run-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pdfplumber requests twilio pytz

      - name: Determine which list to run
        id: listtype
        run: |
          HOUR=$(date -u +%H)
          INPUT="${{ github.event.inputs.list_type }}"

          if [ "$INPUT" = "ALL" ] || [ -z "$INPUT" ]; then
            echo "list=ALL" >> $GITHUB_OUTPUT
          else
            echo "list=$INPUT" >> $GITHUB_OUTPUT
          fi

      - name: Run tracker
        env:
          CL_LIST_TYPE:        ${{ steps.listtype.outputs.list }}
          TWILIO_ACCOUNT_SID:  ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:   ${{ secrets.TWILIO_AUTH_TOKEN }}
          LAWYER_NAME:         ${{ secrets.LAWYER_NAME }}
          WHATSAPP_TO:         ${{ secrets.WHATSAPP_TO }}
          WHATSAPP_ENABLED:    ${{ secrets.WHATSAPP_ENABLED }}
        run: python causelist_tracker.py

     - name: Commit results.json back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --cached --quiet || git commit -m "chore: update results.json [skip ci]"
          git pull --rebase origin main
          git push
